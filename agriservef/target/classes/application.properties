# ============================================================
# AgriServe - Application Configuration
# ============================================================

spring.application.name=AgriServe

# ============================================================
# Database Configuration
# ============================================================
spring.datasource.url=jdbc:mysql://localhost:3306/agriserve_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Connection Pool (HikariCP)
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# ============================================================
# JPA / Hibernate Configuration
# ============================================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

# ============================================================
# Server Configuration
# ============================================================
server.port=8082
server.servlet.context-path=/api

# ============================================================
# JWT Configuration
# ============================================================
# Secret key: Base64-encoded 256-bit HMAC-SHA256 key. CHANGE THIS IN PRODUCTION!
app.jwt.secret=dGhpcyBpcyBhIHNlY3VyZSBhZ3Jpc2VydmUgand0IHNlY3JldCBrZXkgMTIzNDU2Nzg5MA==
app.jwt.expiration-ms=86400000
# 24 hours = 86400000 ms
app.jwt.refresh-expiration-ms=604800000
# 7 days

# ============================================================
# File Upload Configuration
# ============================================================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
app.file.upload-dir=D:\docs

# ============================================================
# Logging Configuration
# ============================================================
logging.level.root=INFO
logging.level.com.agriserve=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# ============================================================
# Actuator Configuration
# ============================================================
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always

# ============================================================
# SpringDoc / Swagger Configuration
# ============================================================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.try-it-out-enabled=true
