# ============================================================
#  AgriServe — application.properties
#  Update DB credentials before running
# ============================================================

spring.application.name=AgriServe

# ── Database ────────────────────────────────────────────────
spring.datasource.url=jdbc:mysql://localhost:3306/agriserve_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=your_mysql_password
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── JPA / Hibernate ─────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ── Server ──────────────────────────────────────────────────
server.port=8080
server.servlet.context-path=/api

# ── JWT ─────────────────────────────────────────────────────
# IMPORTANT: Replace with a 256-bit (32-char) secret in production
app.jwt.secret=AgriServe!@#SecretKey2024$%^&*()QWERTYUIOPabcdefg
app.jwt.expiration-ms=86400000

# ── Multipart (file upload) ──────────────────────────────────
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=15MB

# File storage base path (local filesystem — update for cloud)
app.file.upload-dir=./uploads

# ── Logging ─────────────────────────────────────────────────
logging.level.com.agriserve=DEBUG
logging.level.org.springframework.security=INFO
logging.level.org.hibernate.SQL=DEBUG
